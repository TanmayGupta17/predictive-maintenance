# Render Blueprint: managed PostgreSQL + a single Docker web service that serves
# the frontend, REST API, and Socket.IO on one public URL (built from the root
# Dockerfile). This is "Docker in prod" on a managed host — one link, all devices.
#
# Deploy: Render dashboard -> New + -> Blueprint -> connect this repo -> Apply.

databases:
  - name: predictive-maintenance-db
    databaseName: predictive_maintenance
    plan: free

services:
  - type: web
    name: predictive-maintenance
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: '4000'
      - key: DATABASE_URL
        fromDatabase:
          name: predictive-maintenance-db
          property: connectionString
      - key: SIMULATOR_ENABLED
        value: 'true'
      # 5s cadence keeps the free-tier database comfortable (1s saturated it).
      - key: SIMULATOR_INTERVAL_MS
        value: '5000'
      - key: SIMULATOR_ANOMALY_PROBABILITY
        value: '0.08'
      - key: SIMULATOR_INGESTION_URL
        value: http://localhost:4000/api/telemetry
